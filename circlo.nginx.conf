server {
    listen 80;
    server_name circlo.opsfera.xyz;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name circlo.opsfera.xyz;

    ssl_certificate /etc/letsencrypt/live/circlo.opsfera.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circlo.opsfera.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve static dashboard
    root /home/ubuntu/circlo/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
